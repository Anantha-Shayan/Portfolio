name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package standalone app
        run: |
          mkdir -p .next/standalone/.next
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          tar -czf portfolio-release.tar.gz -C .next/standalone .

      - name: Copy release to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: portfolio-release.tar.gz
          target: /tmp

      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            SERVICE_NAME="${{ secrets.VM_SERVICE }}"
            SERVICE_NAME="${SERVICE_NAME:-portfolio}"
            RELEASE_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$RELEASE_DIR" ]; then
              echo "DEPLOY_PATH secret is required"
              exit 1
            fi
            PREVIOUS_DIR="${RELEASE_DIR}.previous"
            NEW_DIR="${RELEASE_DIR}.new"

            rm -rf "$NEW_DIR"
            mkdir -p "$NEW_DIR"
            tar -xzf /tmp/portfolio-release.tar.gz -C "$NEW_DIR"
            rm -f /tmp/portfolio-release.tar.gz

            rm -rf "$PREVIOUS_DIR"
            if [ -d "$RELEASE_DIR" ]; then
              mv "$RELEASE_DIR" "$PREVIOUS_DIR"
            fi
            mv "$NEW_DIR" "$RELEASE_DIR"

            if ! sudo systemctl restart "$SERVICE_NAME" || ! sudo systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "Service restart failed; rolling back release"
              rm -rf "$RELEASE_DIR"
              if [ -d "$PREVIOUS_DIR" ]; then
                mv "$PREVIOUS_DIR" "$RELEASE_DIR"
                sudo systemctl restart "$SERVICE_NAME" || true
              fi
              exit 1
            fi
